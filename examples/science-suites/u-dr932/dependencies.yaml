# u-dr932 — per-suite LFRic source declaration (per-suite source mechanism, this repo).
#
# Each section is an LFRic-source repo; `ref:` is any git ref (tag/branch/commit)
# that must be PRESENT IN THIS REPO'S LOCAL MIRROR (vendor/lfric_apps,
# vendor/lfric_core, vendor/physics/<name>). examples/science-suites/site/
# extract-sources.sh materialises each ref offline (via `git archive`) into the
# suite's SOURCE_ROOT, then applies the repo's LFRic-source patch stack.
#
# This is the upstream `dependencies.yaml` shape (source:+ref:, fork-merge capable
# upstream); here `source:` is informational — extraction is offline from the
# vendored mirror, never the network. To build a DIFFERENT ref, change it below and
# ensure it is staged in the mirror first (see examples/science-suites/README.md).
#
# The refs below are the exact commits this repo's submodules are pinned at (the
# env's vn3.1.1-era trees), so the extracted build reproduces the validated run.

lfric_apps:
    source: git@github.com:MetOffice/lfric_apps.git
    ref: 2026.07.1   # bd921320 (apps vn3.2)

lfric_core:
    source: git@github.com:MetOffice/lfric_core.git
    ref: 2026.07.1   # 5d2a8b11 (core vn3.2)

casim:
    source: git@github.com:MetOffice/casim.git
    ref: 2026.07.1   # 396cccfe

jules:
    source: git@github.com:MetOffice/jules.git
    ref: 2026.07.1   # b698279d (vn8.2)

socrates:
    source: git@github.com:MetOffice/socrates.git
    ref: 2026.07.1   # 3c9f48b8

ukca:
    source: git@github.com:MetOffice/ukca.git
    ref: 2026.07.1   # 612131bc
