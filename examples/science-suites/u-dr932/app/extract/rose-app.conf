# Science-suite example (this repo): the upstream `extract` task ran merge_sources.py to clone
# lfric_apps/lfric_core/casim/jules/socrates/ukca from MetOffice git into
# SOURCE_ROOT. We instead extract this suite's declared refs (dependencies.yaml)
# OFFLINE from the repo's vendored LOCAL MIRRORS (vendor/lfric_apps, lfric_core,
# physics/*) into SOURCE_ROOT, then apply the LFRic-source patch stack -- no
# network, no clone. This is the per-suite source axis: change dependencies.yaml
# to build a different ref (which must be staged in the mirror first). REPO_ROOT,
# DEPENDENCIES_FILE and SOURCE_ROOT come from flow.cylc's [[root]] environment.
[command]
default=bash "$REPO_ROOT/examples/science-suites/site/extract-sources.sh" \
       =     "$DEPENDENCIES_FILE" "$SOURCE_ROOT" "$REPO_ROOT"
