# u-dr932 — GungHo Shallow/Deep Hot Jupiter Temperature Forcing (Isambard 3).
# Adapted for this repo's science-suite examples (examples/science-suites/): run offline against
# our built env. Differences from the upstream suite:
#   - The upstream [file:bin/*] sections fetched get_git_sources.py/merge_sources.py
#     (SimSys_Scripts) and tweak_iodef (lfric_core) from MetOffice git at install
#     time. We vendor them (bin/ here; tweak_iodef comes from extracted lfric_core
#     at $CORE_ROOT_DIR/bin), so those network fetches are removed.
#   - ACTIVATE_ENV / LFRIC_STACK / LFRIC_PREFIX are injected by run-suite.sh via
#     `cylc vip -S` (not set here), so this file stays path-independent.
#   - dependencies.yaml is rendered from dependencies.yaml.in (offline sources).
[template variables]
BUILD_LFRIC=true
CASE_SETUP='shallow-hot-jupiter'
COMPILER='gnu'
EXPT_DT=1200.0
EXPT_RESUB='P1D'
EXPT_RUNLEN='P1D'
EXPT_START='20000101T0000Z'
EX_HOST='isambard3'
ISAMBARD3_RUN_PARTITION='grace'
ISAMBARD3_SHARED_PARTITION='grace'
ISAMBARD3_SPACK_ENV='lfric-apps-isambard'
ISAMBARD3_SPACK_SETUP=''
LFRIC_CPU='PT1H'
LFRIC_LEVS=''
LFRIC_RES='C48_MG'
PHYSICS_CONF=''
TOTAL_RANKS_REQ=64
VN='3.0'
