# u-dt000 — LFRic Atm Uranus/Neptune Temperature Forcing (Isambard 3).
# Adapted for this repo's Stage 3 (examples/science-suites/). Like u-dr932:
#   - upstream [file:bin/tweak_iodef] git fetch is removed (tweak_iodef comes from
#     the vendored lfric_core, $CORE_ROOT_DIR/bin, at run time);
#   - ACTIVATE_ENV / LFRIC_STACK / LFRIC_PREFIX / REPO_ROOT are injected by
#     run-suite.sh via `cylc vip -S` (ISAMBARD3_SPACK_SETUP emptied so the
#     pre-script uses ACTIVATE_ENV instead of `spack env activate`).
#
# NOTE (version-gated): this suite is VN 2.2, but the repo's vendored sources /
# built env are VN 3.x. build_lfric_atm + build_mesh + generate_mesh compile the
# VN 3.x binary fine, but the VN 2.2 run namelists are not guaranteed to load in
# the VN 3.x lfric_atm — the run may need its science config porting to VN 3.x.
# See README.md.
[template variables]
BUILD_LFRIC=true
CASE_SETUP=''
COMPILER='gnu'
EXPT_DT=120.0
EXPT_RESUB='P100D'
EXPT_RUNLEN='P10000D'
EXPT_START='20000101T0000Z'
EX_HOST='isambard3'
ISAMBARD3_SPACK_SETUP=''
ISAMBARD3_SPACK_ENV='lfric-apps-isambard'
ISAMBARD3_RUN_PARTITION='grace'
ISAMBARD3_SHARED_PARTITION='grace'
ISAMBARD3_MASS_PARTITION='grace'
LFRIC_CPU='PT2H'
LFRIC_LEVS=''
LFRIC_RES='C48_MG'
PHYSICS_CONF=''
TOTAL_RANKS_REQ=108
VN='2.2'
GITHUB_TOKEN=''
GITHUB_USERNAME='x-access-token'
