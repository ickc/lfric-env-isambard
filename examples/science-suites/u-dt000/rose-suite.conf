# u-dt000 — LFRic Atm Uranus/Neptune Temperature Forcing (Isambard 3).
# Adapted for this repo's science-suite examples (examples/science-suites/). Like u-dr932:
#   - upstream [file:bin/tweak_iodef] git fetch is removed (tweak_iodef comes from
#     the vendored lfric_core, $CORE_ROOT_DIR/bin, at run time);
#   - ACTIVATE_ENV / LFRIC_STACK / LFRIC_PREFIX / REPO_ROOT are injected by
#     run-suite.sh via `cylc vip -S` (ISAMBARD3_SPACK_SETUP emptied so the
#     pre-script uses ACTIVATE_ENV instead of `spack env activate`).
#
# NOTE (fork-blocked, not just version): this suite is VN 2.2 and the env is VN 3.x,
# so build_lfric_atm + build_mesh + generate_mesh compile the VN 3.x binary fine and
# the run namelists need forward-porting -- but the deeper blocker is CODE, not config.
# The suite's core science, theta_forcing='ice_giants_obs_like' (namelist:external_
# forcing), is absent from BOTH the vendored vn3.1.1 AND the suite's own declared
# mainline lfric_apps@vn2.2, so it needs an unidentified upstream fork located + staged
# before it can run. The cray run config is ported (mirrors dn704) + validates, but is
# not run pending the fork. See README.md and PLAN.md (follow-up 1).
[template variables]
BUILD_LFRIC=true
CASE_SETUP=''
COMPILER='gnu'
EXPT_DT=120.0
EXPT_RESUB='P100D'
EXPT_RUNLEN='P10000D'
EXPT_START='20000101T0000Z'
EX_HOST='isambard3'
ISAMBARD3_SPACK_SETUP=''
ISAMBARD3_SPACK_ENV='lfric-apps-isambard'
ISAMBARD3_RUN_PARTITION='grace'
ISAMBARD3_SHARED_PARTITION='grace'
ISAMBARD3_MASS_PARTITION='grace'
LFRIC_CPU='PT2H'
LFRIC_LEVS=''
LFRIC_RES='C48_MG'
PHYSICS_CONF=''
# Model ranks (a dedicated XIOS server adds +1 via flow.cylc). 24 = 6 panels x 2x2,
# a valid C48 decomposition that fits one node. (Untested -- suite blocked on the
# ice-giant fork; the original 108 is restored when the science is available.)
TOTAL_RANKS_REQ=24
VN='2.2'
GITHUB_TOKEN=''
GITHUB_USERNAME='x-access-token'
