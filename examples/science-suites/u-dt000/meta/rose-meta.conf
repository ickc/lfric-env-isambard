[template variables=VN]
compulsory=true
description=Apps version
help=The version number of the LFRic Apps release this suite is for, in "x.y" format.
sort-key=1a
type=character

[template variables=BUILD_LFRIC]
compulsory=true
description=Build the executable
help=Add or remove the build tasks from the flow graph
sort-key=1b
type=boolean

[template variables=CASE_SETUP]
compulsory=true
description=Case to run
help=Which idealised setup to run. Options are
    = <base>: Uranus
    = neptune: Neptune
sort-key=2a
values='','neptune'
value-titles=Uranus, Neptune

[template variables=COMPILER]
compulsory=true
description=Which compiler to use
help=CCE is preferred, as it is faster than GNU
sort-key=4d
values='cce','gnu'
value-titles=CCE, GNU

[template variables=EXPT_DT]
compulsory=true
description=Model timestep (s)
help=Length of the model timestep in seconds
sort-key=2b
type=real

[template variables=EXPT_RESUB]
compulsory=true
description=Length of continuation runs
help=Length of each chunk the total model run length will be broken down into.
    = Given in cylc date-time format, e.g. PT1H
sort-key=3c
type=character

[template variables=EXPT_RUNLEN]
compulsory=true
description=Total run length
help=Total time which to run for
    = Given in cylc date-time format, e.g. P1D
sort-key=3b
type=character

[template variables=EXPT_START]
compulsory=true
description=Start date and time of run
help=Date and time at which to start the run
    = Given as a cylc time, e.g. YYYYMMDDTHHMMZ
sort-key=3a
type=character

[template variables=EX_HOST]
compulsory=true
description=Which machine to run on
help=Met Office ex1a zones, Monsoon, or Isambard3
sort-key=4a
values='exab','excd','ex','isambard3'
value-titles=exab, excd, Monsoon, Isambard3


[template variables=ISAMBARD3_SPACK_SETUP]
compulsory=true
description=Spack setup script for Isambard3
help=Full path to the Spack setup-env.sh used on Isambard3
sort-key=4aa
type=character

[template variables=ISAMBARD3_SPACK_ENV]
compulsory=true
description=Spack environment name for Isambard3
help=Spack environment to activate on Isambard3
sort-key=4ab
type=character

[template variables=ISAMBARD3_RUN_PARTITION]
compulsory=true
description=Isambard3 run partition
help=Slurm partition for lfric_atm runs on Isambard3
sort-key=4ac
type=character

[template variables=ISAMBARD3_SHARED_PARTITION]
compulsory=true
description=Isambard3 shared/build partition
help=Slurm partition for shared/build tasks on Isambard3
sort-key=4ad
type=character

[template variables=ISAMBARD3_MASS_PARTITION]
compulsory=true
description=Isambard3 mass partition
help=Slurm partition for mass tasks on Isambard3
sort-key=4ae
type=character

[template variables=ACTIVATE_ENV]
compulsory=true
description=Optional environment activation script
help=Optional script to source before running tasks (Isambard3)
sort-key=4af
type=character

[template variables=LFRIC_CPU]
compulsory=true
description=Wallclock time for each crun
help=Wallclock time to allocate to each continuation run. Max 3hrs
    = Given in cylc date-time format, e.g. PT1H
sort-key=4c
type=character

[template variables=LFRIC_LEVS]
compulsory=true
description=Vertical level set to use
help=Which vertical level set to use. Options are:
    = <base>: 50 levels with 350 km top
sort-key=2d
values=''
value-titles=l50_350km

[template variables=LFRIC_RES]
compulsory=true
description=Horizontal mesh to use
help=Which horizontal resolution and domain size. E.g:
    = C24_MG: 24 cells per panel (24x24x6 columns in total)
sort-key=2c
values='C24_MG', 'C48_MG', 'C64_MG', 'C96_MG', 'C192_MG', 'C224_MG', 'C384_MG'
value-titles=C24, C48, C64, C96, C192, C224, C384

[template variables=PHYSICS_CONF]
compulsory=true
description=Which physics setup to use
help=Temperature and wind forcing options
sort-key=2e
values=''
value-titles=Ice Giant Obs-like

[template variables=TOTAL_RANKS_REQ]
compulsory=true
description=How many processors to use
help=Total number of processors to place the model on. There are 128 per node
    = on the ex1a machine
sort-key=4b
type=integer

[template variables=GITHUB_TOKEN]
compulsory=true
description=GitHub token for private repository access
help=Personal access token used for cloning private GitHub repos (e.g. JULES)
sort-key=4b1
type=character

[template variables=GITHUB_USERNAME]
compulsory=true
description=GitHub username for token auth
help=Username to pair with GITHUB_TOKEN (default x-access-token)
sort-key=4b2
type=character
