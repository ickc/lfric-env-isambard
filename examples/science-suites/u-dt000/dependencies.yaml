# u-dt000 — per-suite LFRic source declaration (Stage-3 mechanism (b), this repo).
#
# extract-sources.sh materialises each ref OFFLINE from this repo's local mirror
# (vendor/lfric_apps, vendor/lfric_core, vendor/physics/<name>) via `git archive`,
# then applies the LFRic-source patch stack. A ref must be present in the mirror.
#
# ⚠️  u-dt000 IS BLOCKED — its science `theta_forcing='ice_giants_obs_like'` is in
# NEITHER the env's vendored vn3.1.1 NOR mainline `lfric_apps@vn2.2` (both verified
# by extraction); it needs an unidentified upstream fork the suite never references
# (see README.md). The refs below are therefore the env's vn3.1.1-era commits (same
# as u-dn704/u-dr932): with them the suite extracts + builds the vn3.1.1 binary and
# aborts at the model on the missing forcing — the documented blocker. To actually
# run dt000's science: (1) locate the ice-giant fork (Exeter RSE), (2) stage it in
# the mirror (`git -C vendor/lfric_apps remote add <fork> <url> && git fetch <fork>`),
# (3) point lfric_apps (and any deps) at that ref here. NB also: mainline vn2.2's
# `jules@apps2.2` is NOT in the local mirror, so a literal vn2.2 build would need
# jules staged first too.

lfric_apps:
    source: git@github.com:MetOffice/lfric_apps.git
    ref: b5aee0b18a071c5b501ecf8a219edff1b1b73e9c   # vn3.1.1-88-gb5aee0b1

