# Stage-3 (this repo): the upstream git_extract_lfric task cloned lfric_apps/
# lfric_core/physics from MetOffice git (over SSH) into SOURCE_ROOT. We instead
# extract this suite's declared refs (dependencies.yaml) OFFLINE from the repo's
# vendored LOCAL MIRRORS into SOURCE_ROOT, then apply the LFRic-source patch stack
# -- no network, no clone. REPO_ROOT, DEPENDENCIES_FILE and SOURCE_ROOT come from
# flow.cylc's [[root]] environment. (Task kept named git_extract_lfric to match the
# suite graph; same offline extract as u-dn704/u-dr932's `extract`.)
[command]
default=bash "$REPO_ROOT/examples/science-suites/site/extract-sources.sh" \
       =     "$DEPENDENCIES_FILE" "$SOURCE_ROOT" "$REPO_ROOT"
