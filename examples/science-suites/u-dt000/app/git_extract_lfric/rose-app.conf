# Stage-3 (this repo): the upstream git_extract_lfric task cloned lfric_apps/
# lfric_core/physics from MetOffice git (over SSH) into SOURCE_ROOT. We instead
# build from the repo's VENDORED, patched submodules (APPS_ROOT_DIR/CORE_ROOT_DIR/
# PHYSICS_ROOT in flow.cylc point there), so this task just verifies those
# vendored trees are present — no network, no clone. Keeps the graph ordering.
[command]
default=set -eu; \
       =for d in "$APPS_ROOT_DIR" "$CORE_ROOT_DIR" \
       =         "$PHYSICS_ROOT/casim" "$PHYSICS_ROOT/jules" \
       =         "$PHYSICS_ROOT/socrates" "$PHYSICS_ROOT/ukca"; do \
       =  if [ ! -d "$d" ]; then \
       =    echo "ERROR: vendored source missing: $d (run: git submodule update --init, or pixi run submodule-init)" >&2; \
       =    exit 1; \
       =  fi; \
       =done; \
       =echo "Stage-3: vendored sources present (lfric_apps, lfric_core, physics/{casim,jules,socrates,ukca})"
