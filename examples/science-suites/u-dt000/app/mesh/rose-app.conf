meta=lfric-mesh_tools/vn2.2

[command]
default=mkdir -p $MESH_DIR ; mpiexec -n 1 $BIN_DIR/cubedsphere_mesh_generator mesh_generation.nml

[env]
OMP_NUM_THREADS=1
mesh_generator=Cubed-Sphere

[file:$DESTINATION_DIRECTORY]
mode=mkdir

[file:mesh_generation.nml]
mode=auto
source=namelist:mesh
      = (namelist:partitions)
      = (namelist:planar_mesh)
      = (namelist:cubedsphere_mesh)
      = (namelist:rotation)
      = (namelist:stretch_transform)

[namelist:cubedsphere_mesh]
edge_cells=48,24,12,6
equatorial_latitude=0
smooth_passes=0

[namelist:mesh]
coord_sys='ll'
geometry='spherical'
mesh_file_prefix='$OUTPUT_FILE_PREFIX'
mesh_maps='dynamics:multigrid_l1','multigrid_l1:multigrid_l2',
         ='multigrid_l2:multigrid_l3'
mesh_names='dynamics','multigrid_l1','multigrid_l2','multigrid_l3'
n_meshes=4
partition_mesh=.false.
rotate_mesh=.false.
topology='periodic'

[!!namelist:partitions]
generate_inner_halos=.false.
max_stencil_depth=1
n_partitions=1
panel_decomposition='auto'
!!panel_xproc=1
!!panel_yproc=1
partition_range=0,0

[!!namelist:planar_mesh]
apply_stretch_transform=.false.
create_lbc_mesh=.false.
domain_centre=0.0,0.0
domain_size=96.0e3,96.0e3
edge_cells_x=64,32,16,8
edge_cells_y=64,32,16,8
!!lbc_parent_mesh='dynamics'
!!lbc_rim_depth=1
periodic_x=.true.
periodic_y=.true.

[!!namelist:rotation]
rotation_target='north_pole'
!!target_north_pole=0.0,90.0
!!target_null_island=0.0,0.0

[!!namelist:stretch_transform]
cell_size_inner=2.0,2.0
cell_size_outer=4.0,4.0
n_cells_outer=1,1
n_cells_stretch=1,1
stretching_on='cell_nodes'
transform_mesh='dynamics'
