# Stage-3 (this repo): updated from the suite's VN 2.2 local_build.py CLI to the
# VN 3.x one our vendored lfric_apps ships — the project is positional (was -a) and
# the old -u/--target_platform flag is now -p/PSYCLONE_TRANSFORMATION (mirrors
# examples/lfric-atm/build.sh).
[command]
default=${APPS_ROOT_DIR}/build/local_build.py \
       lfric_atm \
       -c ${CORE_ROOT_DIR} \
       -w ${WORKING_DIR} \
       -j ${MAKE_THREADS} \
       -t ${TARGET} \
       -p ${PSYCLONE_TRANSFORMATION}

[file:$DESTINATION_DIRECTORY]
mode=mkdir

[file:$WORKING_DIR]
mode=mkdir
