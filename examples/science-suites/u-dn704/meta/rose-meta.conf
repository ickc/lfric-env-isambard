[jinja2:suite.rc=EX_HOST]
compulsory=true
description=Execution host selector
help=Set to 'isambard3' to use the Isambard3 platform, otherwise uses EX host defaults (exab/excd/exz).
sort-key=1c
type=str

[jinja2:suite.rc=ISAMBARD3_SPACK_SETUP]
compulsory=false
description=Path to Spack setup-env.sh for Isambard3
help=Path to the Spack setup script on Isambard3.
sort-key=1c
type=str

[jinja2:suite.rc=ISAMBARD3_SPACK_ENV]
compulsory=false
description=Spack environment name for Isambard3
