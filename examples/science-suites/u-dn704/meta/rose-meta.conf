[jinja2:suite.rc=EX_HOST]
compulsory=true
description=Execution host selector
help=Set to 'isambard3' to use the Isambard3 platform, otherwise uses EX host defaults (exab/excd/exz).
sort-key=1c
type=str

[jinja2:suite.rc=ISAMBARD3_SPACK_SETUP]
compulsory=false
description=Path to Spack setup-env.sh for Isambard3
help=Path to the Spack setup script on Isambard3.
sort-key=1c
type=str

[jinja2:suite.rc=ISAMBARD3_SPACK_ENV]
compulsory=false
description=Spack environment name for Isambard3
help=Name of the Spack environment to activate on Isambard3.
sort-key=1c
type=str

[jinja2:suite.rc=ISAMBARD3_RUN_PARTITION]
compulsory=false
description=Isambard3 run partition
help=Slurm partition for run tasks on Isambard3.
sort-key=1c
type=str

[jinja2:suite.rc=ISAMBARD3_SHARED_PARTITION]
compulsory=false
description=Isambard3 shared partition
help=Slurm partition for shared/build tasks on Isambard3.
sort-key=1c
type=str

[jinja2:suite.rc=MIRROR_LOC]
compulsory=false
description=Location of github mirrors
help=HostName:Path format, pointing at github mirrors. Required if USE_MIRRORS
    =is true.
    =Default value is valid for MetOffice workflows
sort-key=1d
type=str

[jinja2:suite.rc=USE_MIRRORS]
compulsory=true
description=Use local github mirrors
help=Use local github mirrors to clone sources from. Default is true
sort-key=1d
type=boolean

[jinja2:suite.rc=USE_TOKENS]
compulsory=true
description=Github Authentication via github PATs
help=If true, switches sources to use https urls instead of ssh. This requires
    =a github personal access token to be setup to authenticate with github.
    =Default is false
sort-key=1d
type=boolean

[jinja2:suite.rc=ACTIVATE_ENV]
compulsory=false
description=Path to environment activation script
help=Optional script sourced before running suite tasks (e.g. Spack activate).
    =Default points to ../../env_lfric/activate.sh.
sort-key=1d
type=str
