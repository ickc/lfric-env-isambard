# u-dn704 — LFRic Atm NWP GAL9 NoMG @ C12 (Isambard 3).
# Adapted for this repo's science-suite examples (examples/science-suites/). Like u-dr932:
#   - upstream [file:bin/*] git fetches (SimSys_Scripts, lfric_core tweak_iodef)
#     are removed — we build from vendored sources; tweak_iodef comes from the
#     vendored lfric_core ($CORE_ROOT_DIR/bin) at run time.
#   - ACTIVATE_ENV / LFRIC_STACK / LFRIC_PREFIX / REPO_ROOT are injected by
#     run-suite.sh via `cylc vip -S`.
#
# NOTE (data-gated): the lfric_atm RUN of this NWP case needs Met-Office
# ancillaries + a start dump + GA9 spectra that are NOT in this repo (see
# app/lfric_atm/rose-app.conf: ancil_directory, start_dump_directory,
# spectral_file_*). build_lfric_atm / build_mesh / generate_mesh run offline;
# the run task needs BIG_DATA_DIR populated. See README.md.
[template variables]
EX_HOST='isambard3'
ISAMBARD3_SPACK_SETUP=''
ISAMBARD3_SPACK_ENV='lfric-apps-isambard'
ISAMBARD3_RUN_PARTITION='grace'
ISAMBARD3_SHARED_PARTITION='grace'
