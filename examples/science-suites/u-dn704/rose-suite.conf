# u-dn704 — LFRic Atm NWP GAL9 NoMG @ C12 (Isambard 3).
# Adapted for this repo's science-suite examples (examples/science-suites/). Like u-dr932:
#   - upstream [file:bin/*] git fetches (SimSys_Scripts, lfric_core tweak_iodef)
#     are removed — we build from vendored sources; tweak_iodef comes from the
#     vendored lfric_core ($CORE_ROOT_DIR/bin) at run time.
#   - ACTIVATE_ENV / LFRIC_STACK / LFRIC_PREFIX / REPO_ROOT are injected by
#     run-suite.sh via `cylc vip -S`.
#
# NOTE (external data, staged): the lfric_atm RUN of this NWP case reads Met-Office
# ancillaries, a start dump and um_aux ctldata from BIG_DATA_DIR, and GA9 spectra
# from the vendored socrates ($PHYSICS_ROOT) -- see app/lfric_atm/rose-app.conf
# (ancil_directory, start_dump_directory, [file:lut]/[file:precalc], spectral_file_*).
# None of this lives in the repo, but it is staged on Isambard 3 at the default
# BIG_DATA_DIR=/projects/u35v/sw/lfricdata, so the suite runs end-to-end there --
# offline, no run-time um_aux clone, no MO SSO. (build/mesh run offline regardless.)
# Point BIG_DATA_DIR elsewhere to relocate the data. See README.md.
[template variables]
EX_HOST='isambard3'
ISAMBARD3_SPACK_SETUP=''
ISAMBARD3_SPACK_ENV='lfric-apps-isambard'
ISAMBARD3_RUN_PARTITION='grace'
ISAMBARD3_SHARED_PARTITION='grace'
