# Stage-3 (this repo): the upstream `extract` task ran merge_sources.py to clone
# lfric_apps/lfric_core/casim/jules/socrates/ukca from MetOffice git into
# SOURCE_ROOT. We instead build from the repo's VENDORED, patched submodules
# (APPS_ROOT_DIR/CORE_ROOT_DIR/PHYSICS_ROOT in flow.cylc point there), so this
# task just verifies those vendored trees are present (submodules initialised) --
# no network, no clone. It keeps the suite's extract -> build ordering intact.
[command]
default=set -eu; \
       =for d in "$APPS_ROOT_DIR" "$CORE_ROOT_DIR" \
       =         "$PHYSICS_ROOT/casim" "$PHYSICS_ROOT/jules" \
       =         "$PHYSICS_ROOT/socrates" "$PHYSICS_ROOT/ukca"; do \
       =  if [ ! -d "$d" ]; then \
       =    echo "ERROR: vendored source missing: $d (run: git submodule update --init, or pixi run submodule-init)" >&2; \
       =    exit 1; \
       =  fi; \
       =done; \
       =echo "Stage-3: vendored sources present (lfric_apps, lfric_core, physics/{casim,jules,socrates,ukca})"
