[workspace]
name = "lfric-env-isambard"
version = "0.1.0"
description = "Pixi-driven, submodule-based reproducible build of the LFRic Apps Spack environment for Isambard 3 (GCC 14.3)."
channels = ["conda-forge"]
platforms = ["linux-aarch64"]

[dependencies]
# Pixi bootstraps Python. This Python RUNS Spack, so it must be < 3.12: Spack
# 1.0 uses ast.Str, removed in Python 3.12. (The LFRic environment itself builds
# its own Python 3.12 via Spack — that is independent of this one.)
python = "3.11.*"

# Auto-activate the built Spack environment on every `pixi run` / `pixi shell`,
# in two sourced steps:
#   common.sh    puts the vendored `spack` on PATH + the generated modulefiles on
#                MODULEPATH (so `pixi run spack ...` and `module load` both work).
#   activate.sh  `module load`s lfric-env/<LFRIC_STACK> (the generated modulefile
#                $PREFIX/modulefiles/lfric-env/<variant>.lua).
# Both are a NO-OP until `pixi run build` has produced the modulefile, so this is
# safe before the first build. Order matters: common.sh sets the MODULEPATH that
# activate.sh relies on.
#
# This whole block is a CONVENIENCE for working inside pixi, not a requirement:
# pixi only matters for *building* the environment (Stage 1, where it supplies the
# Python above). The build's product is a self-contained Lmod modulefile, so the
# environment is loaded — and the examples built on top of it — with nothing but
# `module load lfric-env/<variant>`, no pixi. See README "Architecture".
[activation]
scripts = ["scripts/common.sh", "scripts/activate.sh"]

[tasks]
# One-time: clone the pinned Stage-1 (core) submodules — Spack, the package repos
# and the LFRic sources. All of these clone anonymously over HTTPS except
# mo-spack-packages, which is still private: that one needs an SSH key authorized
# for Met Office SSO (or an HTTPS credential helper); see the README note. The
# physics submodules (used by the examples, not Stage 1) are SEPARATE — see
# `init-physics`.
submodule-init = "git submodule update --init --recursive --jobs 4 -- vendor/spack vendor/spack-packages vendor/lfric_apps vendor/lfric_core vendor/mo-spack-packages"

# Examples only (not Stage 1): clone the pinned physics submodules (casim/jules/
# socrates/ukca), needed to compile lfric_atm (examples/minimal-compile/ and the
# science-suites extract them per-suite). All four are public — no credentials.
init-physics = "git submodule update --init --jobs 4 -- vendor/physics/casim vendor/physics/jules vendor/physics/socrates vendor/physics/ukca"

# Stage/update the pinned physics + lfric_core submodules to the refs in
# vendor/lfric_apps/dependencies.yaml, then commit the gitlinks. This is the
# explicit, reproducible way to pull in new science: local_build.py no longer
# auto-clones (patches/30-lfric_apps-local-sources-patch.sh), so the build only
# reads what you stage. See scripts/stage-physics.sh.
stage-physics = "bash scripts/stage-physics.sh"

# Apply every patches/*-patch.sh, in sorted order (idempotent). `build` runs
# this automatically; this task is for applying patches on their own.
patch = "bash scripts/patch-all.sh"

# Revert all patches by resetting the patched submodules to their pinned commit.
unpatch = "bash scripts/unpatch.sh"

# Bump the ENVIRONMENT version (CalVer in ./VERSION) so the next build lands in a
# fresh, distinct prefix ($BASE/<version>) + module (lfric-env/<version>/<variant>)
# instead of overwriting the current install. No arg -> today's date; or pass an
# explicit version. Commit ./VERSION afterwards. See scripts/bump-env-version.sh.
bump-env-version = "bash scripts/bump-env-version.sh"

# Build the Spack environment — the bulk of the work (~2-4 h from scratch;
# re-runs are incremental). Run it on a compute node (see scripts/build.sbatch).
# Applies patches first, then concretizes and installs into PREFIX.
#
# Two dependency variants share one install tree ($PREFIX/opt), selected by
# LFRIC_STACK (default "cray"; see scripts/common.sh):
#   pixi run build                     # cray: system cray-mpich + Cray HDF5/netCDF
#   pixi run build-spack               # spack: mpich + HDF5/netCDF from source
# The convenience tasks below just set LFRIC_STACK; equivalently prefix any task,
# e.g. `LFRIC_STACK=spack pixi run build-lfric-atm`.
build = "bash scripts/build.sh"
build-spack = "LFRIC_STACK=spack bash scripts/build.sh"

# Concretize ONLY — the dependency solve + variant assertions, then stop. This is
# the cheap, login-node-safe check that a manifest/variant change still solves
# (no multi-hour install). Idempotent: a no-op when the lock already matches the
# manifest; set FORCE_CONCRETIZE=1 to force a fresh re-solve. `build` and `fetch`
# both run this same phase first (scripts/lib.sh).
concretize = "bash scripts/concretize.sh"
concretize-spack = "LFRIC_STACK=spack bash scripts/concretize.sh"

# Login-node pre-fetch: clone the pinned Stage-1 submodules (if missing), then
# download every from-source Spack package (xios, mpich, hdf5, ...) into
# $PREFIX/source-cache, so the compute-node `build` runs offline and survives an
# intermittent source-host blip (e.g. the gitlab.in2p3.fr XIOS clone). Run this on
# a LOGIN NODE before `build`. Concurrency is capped (FETCH_JOBS, default 4) for
# the login node's small `ulimit -u`. As with `build`, repeat for the spack variant:
#   pixi run fetch                     # cray variant's sources
#   pixi run fetch-spack               # spack variant's sources
fetch = "bash scripts/fetch.sh"
fetch-spack = "LFRIC_STACK=spack bash scripts/fetch.sh"

# MINIMAL-COMPILE EXAMPLE: compile lfric_atm and run its bundled example on the
# built environment. The smallest worked example of building a science target
# (copy/adapt it — see examples/minimal-compile/). Needs the physics submodules
# (`init-physics`).
build-lfric-atm = "bash examples/minimal-compile/build.sh"

# SCIENCE-SUITE EXAMPLE: run a real Rose/Cylc LFRic science suite on the built env.
# Pass the suite id, e.g. `pixi run run-suite u-dr932` (cray env by default). Drives
# cylc on the login node -> Slurm (not sbatch); see examples/science-suites/README.md.
run-suite = "bash examples/science-suites/run-suite.sh"

# Optional, opt-in: configure cylc (a run dir + an isambard3 Slurm platform) for
# running rose/cylc suites. NOT part of `build` — building must not touch ~/.cylc.
setup-cylc = "bash scripts/setup-cylc.sh"

# Activate the environment and report tool versions (rose / cylc / psyclone).
# activate-spack reports the from-source variant; either is a no-op until built.
activate = "bash scripts/print-versions.sh"
activate-spack = "LFRIC_STACK=spack bash scripts/print-versions.sh"

# Verify the migrated XIOS source matches the pinned commit (network check).
verify-xios = "bash scripts/xios-verification.sh"
